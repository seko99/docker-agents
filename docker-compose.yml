services:
  dockerd:
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
    volumes:
      - docker-data:/var/lib/docker
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 20

  codex:
    build:
      context: .
      dockerfile: Dockerfile.codex
    container_name: codex-agent
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      PATH: /usr/local/go/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/codex-home/go/bin:/go/bin
      CODEX_HOME: /codex-home
      HOME: /codex-home/home
      XDG_CACHE_HOME: /codex-home/cache/xdg
      GOPATH: /codex-home/go
      GOBIN: /codex-home/go/bin
      GOCACHE: /codex-home/cache/go-build
      GOMODCACHE: /codex-home/cache/gomod
      GOLANGCI_LINT_CACHE: /codex-home/cache/golangci-lint
      GOPRIVATE: ${GOPRIVATE:-gitlab.yourdomain.org/*}
      GONOSUMDB: ${GONOSUMDB:-gitlab.yourdomain.org/*}
      GONOPROXY: ${GONOPROXY:-gitlab.yourdomain.org/*}
      GIT_ALLOW_PROTOCOL: ${GIT_ALLOW_PROTOCOL:-file:https:ssh}
      GIT_TERMINAL_PROMPT: "0"
      DOCKER_HOST: tcp://dockerd:2375
      TESTCONTAINERS_HOST_OVERRIDE: dockerd
    depends_on:
      dockerd:
        condition: service_healthy
    volumes:
      - ${PROJECT_DIR:-./}:/workspace:rw
      - ${CODEX_HOME_DIR:-./.codex-home}:/codex-home:rw
      - ${HOST_SSH_DIR:-/home/seko/.ssh}:/codex-home/home/.ssh:ro
      - ${HOST_GITCONFIG:-/home/seko/.gitconfig}:/codex-home/home/.gitconfig:ro
    command: ["--dangerously-bypass-approvals-and-sandbox"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777
      - /root

  codex-login:
    build:
      context: .
      dockerfile: Dockerfile.codex
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      PATH: /usr/local/go/bin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/codex-home/go/bin:/go/bin
      CODEX_HOME: /codex-home
      HOME: /codex-home/home
      GIT_ALLOW_PROTOCOL: ${GIT_ALLOW_PROTOCOL:-file:https:ssh}
      GIT_TERMINAL_PROMPT: "0"
    volumes:
      - ${PROJECT_DIR:-./}:/workspace:rw
      - ${CODEX_HOME_DIR:-./.codex-home}:/codex-home:rw
      - ${HOST_SSH_DIR:-/home/seko/.ssh}:/codex-home/home/.ssh:ro
      - ${HOST_GITCONFIG:-/home/seko/.gitconfig}:/codex-home/home/.gitconfig:ro
    command: ["login"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777
      - /root
    network_mode: host

volumes:
  docker-data:
